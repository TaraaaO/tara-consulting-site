[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# HTML pages: always revalidate with Netlify before showing content,
# but (unlike no-store) still allow the browser to keep a copy so a
# revalidation can return a fast 304 instead of a full re-download.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Static assets: no cache-busting/hashed filenames exist, so keep the
# cache lifetime short and force revalidation rather than disabling
# caching outright. This lets repeat page loads reuse CSS/JS/fonts
# instead of re-fetching them on every single navigation, which was
# guaranteeing a slow first paint (and the resulting "flash") on every
# click.
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
